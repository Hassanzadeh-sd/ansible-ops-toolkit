---
# Install nginx and render a validated, idempotent configuration.
- name: Install nginx
  ansible.builtin.apt:
    name: "{{ nginx_package }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Deploy the nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    validate: nginx -t -c %s
  notify: Reload nginx

- name: Ensure nginx is running and enabled at boot
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
